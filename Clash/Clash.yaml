# mihomo 配置
# 适用版本：所有使用 mihomo 核心的程序

port: 7890
socks-port: 7891
mixed-port: 7892
redir-port: 7893
tproxy-port: 7894

unified-delay: true
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

allow-lan: true
mode: rule
log-level: info
ipv6: false
udp: true

external-controller: 0.0.0.0:9090

geox-url:
  mmdb: 'https://gitlab.com/Masaiki/GeoIP2-CN/-/raw/release/Country.mmdb'
  asn: 'https://gitlab.com/Loon0x00/loon_data/-/raw/main/geo/GeoLite2-ASN.mmdb'

profile:
  store-selected: true
  store-fake-ip: true
  
tun:
  enable: true
  stack: gvisor              # Windows 推荐 gvisor
  dns-hijack:
    - any:53                 # 劫持所有 DNS 请求
  auto-route: true
  auto-detect-interface: true
  mtu: 1500                  
# ────────────────────────────────────────────────────────────
# Sniffer 配置（TUN 模式下必须！）
# ────────────────────────────────────────────────────────────
sniffer:
  enable: true
  force-dns-mapping: true    # 用嗅探到的 SNI 覆盖 DNS 映射
  parse-pure-ip: true        # 对没有 DNS 记录的连接也进行嗅探
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
    QUIC:
      ports: [443, 8443]

dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 192.18.0.0/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.msftncsi.com'
    - 'www.msftconnecttest.com'
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    '+.openai.com':
      - https://8.8.8.8/dns-query
      - https://1.1.1.1/dns-query
    '+.chatgpt.com':
      - https://8.8.8.8/dns-query
      - https://1.1.1.1/dns-query
    '+.anthropic.com':
      - https://8.8.8.8/dns-query
      - https://1.1.1.1/dns-query
    '+.claude.ai':
      - https://8.8.8.8/dns-query
      - https://1.1.1.1/dns-query
    '+.google.com':
      - https://8.8.8.8/dns-query
      - https://1.1.1.1/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query


# 锚点 - 节点订阅的参数 [每小时更新一次订阅节点，每 60 秒一次健康检查]
NodeParam: &NodeParam {type: http, interval: 3600, health-check: {enable: true, url: 'http://www.google.com/blank.html', interval: 60,lazy: false}}
# 锚点 - 规则参数 [每小时更新一次订阅规则，更新规则时使用直连策略]
RuleProviders: &RuleProviders {type: http, behavior: classical, interval: 3600, format: yaml, proxy: DIRECT}

proxy-providers: 
  sub-url:
    url: 'sub.url'
    <<: *NodeParam
    path: './proxy_providers/clash.sub.yaml'
    override:
      additional-prefix: "[clash.sub] " # 为订阅节点添加机场名称前缀
proxy-groups:
  # 基于地区分组
  - name: US
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/United_States.png
    type: url-test
    include-all: true
    interval: 120
    tolerance: 50
    lazy: true
    filter: "(?i)(美|🇺🇲|us|states|america)"
  - name: HK
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Hong_Kong.png
    type: url-test
    include-all: true
    interval: 120
    tolerance: 50
    lazy: true
    filter: "(?i)(澳门|🇲🇴|港|🇭🇰|hk|hong)"
  - name: TW
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/China.png
    type: url-test
    include-all: true
    interval: 120
    tolerance: 50
    lazy: true
    filter: "(?i)(台|🇹🇼|湾|taiwan)"
  - name: JP
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Japan.png
    type: url-test
    include-all: true
    interval: 120
    tolerance: 50
    lazy: true
    filter: "(?i)(日|🇯🇵|东京|大阪|jp|japan)"
  - name: KR
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Korea.png
    type: url-test
    include-all: true
    interval: 120
    tolerance: 50
    lazy: true
    filter: "(?i)(韩|🇰🇷|KR|korea)"
  - name: SG
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Singapore.png
    type: url-test
    include-all: true
    interval: 120
    tolerance: 50
    lazy: true
    filter: "(?i)(SG|坡|狮城|🇸🇬|sg|singapore)"
  - name: Other_Regions
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/World_Map.png
    type: url-test
    include-all: true
    interval: 120
    tolerance: 50
    lazy: true
    filter: "(?i)(马|俄|印|德|土|阿|拿|菲|澳|爱|荷|瑞|巴|越|泰|柬|法|意|以|韩)"

  # 功能分组
  - name: Default_Proxy
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Proxy.png
    type: select
    proxies:
      - HK
      - TW
      - JP
      - KR
      - US
      - SG
      - Other_Regions
  - name: Google
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Google_Search.png
    type: select
    proxies:
      - US
      - HK
      - TW
      - Default_Proxy
  - name: Apple
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Apple.png
    type: select
    proxies:
      - DIRECT
      - Default_Proxy
      - HK
      - JP
      - US
      - Other_Regions
  - name: Telegram
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Telegram.png
    type: select
    proxies:
      - Default_Proxy
      - HK
      - US
  - name: Github
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/GitHub.png
    type: select
    proxies:
      - Default_Proxy
      - HK
      - US

rule-providers:
  Lan:
    <<: *RuleProviders
    path: './rules/Lan.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.yaml'
  telegram:
    <<: *RuleProviders
    path: './rules/Telegram.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml'
  github:
    <<: *RuleProviders
    path: './rules/Github.yaml'
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/GitHub/GitHub.yaml
  google:
    <<: *RuleProviders
    path: './rules/Google.yaml'
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Google/Google.yaml
  youtube:
    <<: *RuleProviders
    path: './rules/YouTube.yaml'
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/YouTube/YouTube.yaml
  apple:
    <<: *RuleProviders
    path: './rules/Apple.yaml'
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Apple/Apple.yaml
  Gemini:
    <<: *RuleProviders
    path: './rules/Gemini.yaml'
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Gemini/Gemini.yaml
  Claude:
    <<: *RuleProviders
    path: './rules/Claude.yaml'
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Claude/Claude.yaml
  OpenAI:
    <<: *RuleProviders
    path: './rules/OpenAI.yaml'
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/OpenAI/OpenAI.yaml   
    
rules:

  - RULE-SET,Gemini,Google
  - RULE-SET,Claude,US
  - RULE-SET,OpenAI,US
  - RULE-SET,github,Github
  - RULE-SET,google,Google
  - RULE-SET,youtube,Google
  - RULE-SET,apple,Apple
  - RULE-SET,telegram,Telegram
  - RULE-SET,Lan,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,Default_Proxy
