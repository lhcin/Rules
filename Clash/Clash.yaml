# mihomo 配置
# 适用版本：所有使用 mihomo 核心的程序

mixed-port: 7897

unified-delay: true
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
tcp-concurrent: true
find-process-mode: strict

allow-lan: true
mode: rule
log-level: info
ipv6: false
udp: true

external-controller: 127.0.0.1:9090

geox-url:
  mmdb: 'https://gitlab.com/Masaiki/GeoIP2-CN/-/raw/release/Country.mmdb'
  asn: 'https://gitlab.com/Loon0x00/loon_data/-/raw/main/geo/GeoLite2-ASN.mmdb'

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: gvisor              # Windows 推荐 gvisor
  dns-hijack:
    - any:53                 # 劫持所有 DNS 请求
  auto-route: true
  auto-detect-interface: true
  mtu: 1500
# ────────────────────────────────────────────────────────────
# Sniffer 配置（TUN 模式下必须！）
# ────────────────────────────────────────────────────────────
sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 192.18.0.0/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.msftncsi.com'
    - 'www.msftconnecttest.com'
    - '*.ntp.org.cn'
    - 'time.*.com'
    - 'localhost.ptlogin2.qq.com'
    - '*.stun.*.*'
    - '*.stun.*.*.*'
    - '*.stun.*.*.*.*'
    - '*.stun.*.*.*.*.*'
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - 223.5.5.5
    - 114.114.114.114

# 锚点 - 节点订阅的参数 [每天更新一次订阅节点，每 600 秒一次健康检查]
NodeParam: &NodeParam {type: http, interval: 86400, health-check: {enable: true, url: 'https://www.gstatic.com/generate_204', interval: 600}}
# 锚点 - fallback 参数配置 [每 300 秒一次惰性健康检查，时延超过 2 秒判定为失败，失败 3 次自动触发健康检查]
FallBack: &FallBack {type: fallback, url: 'https://www.gstatic.com/generate_204', interval: 300, lazy: true, timeout: 2000, disable-udp: false, max-failed-times: 3, hidden: true, include-all: true}
# 锚点 - 规则参数 [每天更新一次订阅规则，更新规则时使用直连策略]
RuleProviders: &RuleProviders {type: http, behavior: classical, interval: 86400, format: yaml, proxy: DIRECT}

proxy-providers:
  sub-url:
    url: 'sub.url'
    <<: *NodeParam
    path: './proxy_providers/sub1.yaml'
    override:
      additional-prefix: "[clash.sub1] " # 为订阅节点添加机场名称前缀
  sub2-url:
    url: 'sub2.url'
    <<: *NodeParam
    path: './proxy_providers/sub2.yaml'
    override:
      additional-prefix: "[clash.sub2] " # 为订阅节点添加机场名称前缀
proxy-groups:
  # ────────────────────────────────────────────────────────────
  # 地区分组 - 自动回退 (fallback，节点不可用时切换同地区其他节点)
  # ────────────────────────────────────────────────────────────
  - name: HK_Fallback
    <<: *FallBack
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Hong_Kong.png
    filter: "(?i)(澳门|🇲🇴|港|🇭🇰|hk|hong)"

  - name: TW_Fallback
    <<: *FallBack
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/China.png
    filter: "(?i)(台|🇹🇼|湾|taiwan)"

  - name: JP_Fallback
    <<: *FallBack
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Japan.png
    filter: "(?i)(日|🇯🇵|东京|大阪|jp|japan)"

  - name: US_Fallback
    <<: *FallBack
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/United_States.png
    filter: "(?i)(美|🇺🇲|us|states|america)"
    hidden: false
    
  - name: SG_Fallback
    <<: *FallBack
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Singapore.png
    filter: "(?i)(SG|坡|狮城|🇸🇬|singapore)"

  - name: Other_Fallback
    <<: *FallBack
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/World_Map.png
    filter: "(?i)(马|俄|印|德|土|阿|拿|菲|澳|爱|荷|瑞|巴|越|泰|柬|法|意|以|韩)"

  # ────────────────────────────────────────────────────────────
  # 全局智能回退组 - 地区全部不可用时自动转移到其他地区
  # ────────────────────────────────────────────────────────────
  - name: Global_Fallback
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Proxy.png
    type: fallback
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    lazy: true
    timeout: 2000
    max-failed-times: 3
    proxies:
      - HK_Fallback
      - TW_Fallback
      - JP_Fallback
      - US_Fallback
      - SG_Fallback
      - Other_Fallback

 # ────────────────────────────────────────────────────────────
  # 功能分组
  # ────────────────────────────────────────────────────────────
  - name: Default_Proxy
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Proxy.png
    type: select
    proxies:
      - HK_Fallback
      - US_Fallback
      - TW_Fallback
      - JP_Fallback
      - SG_Fallback
      - Other_Fallback
      - Global_Fallback

  - name: Google
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Google_Search.png
    type: select
    proxies:
      - US_Fallback
      - HK_Fallback
      - Default_Proxy

  - name: Apple
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Apple.png
    type: select
    proxies:
      - DIRECT
      - Default_Proxy
      - HK_Fallback
      - US_Fallback

  - name: Telegram
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Telegram.png
    type: select
    proxies:
      - Default_Proxy
      - HK_Fallback
      - US_Fallback

  - name: Github
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/GitHub.png
    type: select
    proxies:
      - Default_Proxy
      - HK_Fallback
      - US_Fallback
      
rule-providers:
  Lan:
    <<: *RuleProviders
    path: './rules/Lan.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.yaml'
  Telegram:
    <<: *RuleProviders
    path: './rules/Telegram.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml'
  Github:
    <<: *RuleProviders
    path: './rules/Github.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml'
  Google:
    <<: *RuleProviders
    path: './rules/Google.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.yaml'
  Youtube:
    <<: *RuleProviders
    path: './rules/YouTube.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml'
  Apple:
    <<: *RuleProviders
    path: './rules/Apple.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml'
  Gemini:
    <<: *RuleProviders
    path: './rules/Gemini.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml'
  Claude:
    <<: *RuleProviders
    path: './rules/Claude.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml'
  OpenAI:
    <<: *RuleProviders
    path: './rules/OpenAI.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml'

rules:
  - RULE-SET,Lan,DIRECT
  - RULE-SET,Gemini,Google
  - RULE-SET,Claude,US
  - RULE-SET,OpenAI,US
  - RULE-SET,Github,Github
  - RULE-SET,Google,Google
  - RULE-SET,Youtube,Google
  - RULE-SET,Apple,Apple
  - RULE-SET,Telegram,Telegram
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,Default_Proxy
