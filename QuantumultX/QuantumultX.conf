[general]
profile_img_url=https://gitlab.com/lodepuly/iconlibrary/raw/main/App_icon/144px/Quantumult_X.png
resource_parser_url=https://cdn.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/resource-parser.js
network_check_url = http://www.apple.com/library/test/success.html
server_check_url=http://www.google.com/generate_204
server_check_timeout = 2000

udp_drop_list = 443
fallback_udp_policy = tunnel
# 银行/金融/内网域名DNS不走代理
dns_exclusion_list=*.cmpassport.com,*.cmbchina.com,*.qq.com,*.baidu.com,*.boc.cn,*.ccb.com,*.lan,*.local,*.icbc.com.cn,*.psbc.com,*.spdb.com.cn,*.cmbc.com.cn,*.abchina.com,*.abchina.com.cn,*.abcchina.cn,*.95599.cn,*.bankcomm.com,*.cebbank.com,*.cgbchina.com.cn,*.hxb.com.cn,*.czbank.com,*.cib.com.cn,*.citicbank.com,*.citic.com,*.ecitic.com,*.gzcb.com.cn,*.bosc.cn
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js
# 排除路由（补充 RFC 保留地址段）
excluded_routes=192.168.0.0/16,172.16.0.0/12,100.64.0.0/10,10.0.0.0/8,169.254.0.0/16,192.0.0.0/24,192.0.2.0/24,192.88.99.0/24,198.51.100.0/24,203.0.113.0/24
icmp_auto_reply = true

[dns]
circumvent-ipv4-answer = 127.0.0.1, 0.0.0.0
circumvent-ipv6-answer = ::1, ::0
prefer-doh3
no-system
no-ipv6
server=114.114.114.114
server=223.5.5.5
doq-server=quic://223.5.5.5:853,quic://223.6.6.6:853

[policy]
# --- Fallback Policy Groups (At the end, performs fallback between regional nodes) ---
# These available groups use regex to select regional nodes and perform automatic fallback among them
available=🇭🇰HK_Node_Fallback,resource-tag-regex=.,server-tag-regex=^(?=.*((?i)🇭🇰|香港|(\b(HK|Hong)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png
available=🇨🇳TW_Node_Fallback,resource-tag-regex=.,server-tag-regex=^(?=.*((?i)🇹🇼|台湾|(\b(TW|Tai|Taiwan)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China.png
available=🇯🇵JP_Node_Fallback,resource-tag-regex=.,server-tag-regex=^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|Japan)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png
available=🇸🇬SG_Node_Fallback,resource-tag-regex=.,server-tag-regex=^(?=.*((?i)🇸🇬|新加坡|狮|(\b(SG|Singapore)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png
available=🇺🇸US_Node_Fallback,resource-tag-regex=.,server-tag-regex=^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|United States)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png

# --- Static Policy Groups (At the beginning) ---
# Adblock group for advertisement blocking
static=Adblock,reject,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Advertising.png

# Custom rule groups pointing to regional static groups
static=Google,🇺🇸US_Node,Proxy_Select,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png
static=Telegram,🇺🇸US_Node,Proxy_Select,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png
static=YouTube,🇺🇸US_Node,Proxy_Select,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
static=AI,🇺🇸US_Node,Proxy_Select,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png

# Regional static groups select between their Fallback and UrlTest groups (Fallback is first, UrlTest is second), AND display regional nodes
# static=🇭🇰HK_Node,🇭🇰HK_Node_Fallback,resource-tag-regex=.,server-tag-regex=^(?=.*((?i)🇭🇰|香港|(\b(HK|Hong)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png
# static=🇨🇳TW_Node,🇨🇳TW_Node_Fallback,resource-tag-regex=.,server-tag-regex=^(?=.*((?i)🇹🇼|台湾|(\b(TW|Tai|Taiwan)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China.png
# static=🇯🇵JP_Node,🇯🇵JP_Node_Fallback,resource-tag-regex=.,server-tag-regex=^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|Japan)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png
# static=🇸🇬SG_Node,🇸🇬SG_Node_Fallback,resource-tag-regex=.,server-tag-regex=^(?=.*((?i)🇸🇬|新加坡|狮|(\b(SG|Singapore)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png
static=🇺🇸US_Node,🇺🇸US_Node_Fallback,resource-tag-regex=.,server-tag-regex=^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|United States)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png

# Other region static selector
static=🇨🇳Other_Region,resource-tag-regex=.,server-tag-regex=^(?=.*((?i)马|俄|印|德|土|阿|拿|菲|澳|爱|荷|瑞|巴|越|泰|柬|法|意|以|韩))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Area.png

# Proxy_Select main group selects between regional static groups, Other_Region, and DIRECT
static=Proxy_Select,🇭🇰HK_Node_Fallback,🇺🇸US_Node_Fallback,🇨🇳Other_Region,direct,img-url=https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png

